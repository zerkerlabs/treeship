name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: treeship-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: treeship-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: treeship-darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p treeship-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/treeship ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            treeship-linux-x86_64/treeship-linux-x86_64
            treeship-darwin-aarch64/treeship-darwin-aarch64
            treeship-darwin-x86_64/treeship-darwin-x86_64
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish @treeship/sdk
        continue-on-error: true
        working-directory: packages/sdk-ts
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @treeship/mcp
        continue-on-error: true
        working-directory: bridges/mcp
        run: |
          npm install
          npm run build
          sleep 5
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @treeship/cli-linux-x64
        continue-on-error: true
        working-directory: npm/@treeship/cli-linux-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @treeship/cli-darwin-arm64
        continue-on-error: true
        working-directory: npm/@treeship/cli-darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @treeship/cli-darwin-x64
        continue-on-error: true
        working-directory: npm/@treeship/cli-darwin-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish treeship (main wrapper)
        continue-on-error: true
        working-directory: npm/treeship
        run: |
          sleep 5
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish treeship-core
        continue-on-error: true
        run: cargo publish -p treeship-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish treeship-cli
        continue-on-error: true
        run: cargo publish -p treeship-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build and publish treeship-sdk
        continue-on-error: true
        working-directory: packages/sdk-python
        run: |
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
