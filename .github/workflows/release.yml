name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Preflight: fail the entire release if any package manifest, version file, or
  # internal-dep pin disagrees with the tag. Runs first; every other job
  # `needs:` it so a misalignment cannot produce a partial release like the
  # v0.9.6 PyPI/Python drift or the stale @treeship/core-wasm pins.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check every release-version site against the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/check-release-versions.py "$VERSION"

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: treeship-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: treeship-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: treeship-darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p treeship-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/treeship ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    outputs:
      sha256_linux_x86_64:    ${{ steps.checksums.outputs.sha256_linux_x86_64 }}
      sha256_darwin_aarch64:  ${{ steps.checksums.outputs.sha256_darwin_aarch64 }}
      sha256_darwin_x86_64:   ${{ steps.checksums.outputs.sha256_darwin_x86_64 }}

    steps:
      - uses: actions/download-artifact@v4

      # Compute SHA-256 of every binary that's about to be published.
      # The hashes are:
      #   1. uploaded to the GitHub Release as SHA256SUMS (auditors can
      #      cross-check what the release actually contains).
      #   2. surfaced as job outputs so the publish-npm job below can
      #      embed each per-platform hash into its npm package without
      #      re-downloading the binary.
      # The npm postinstall verifies binary against the embedded hash;
      # because the hash arrives via npm and the binary arrives via
      # GitHub, an attacker would have to compromise both trust roots
      # to slip a tampered binary past install.
      - name: Compute SHA256SUMS
        id: checksums
        run: |
          set -e
          (
            cd treeship-linux-x86_64    && sha256sum treeship-linux-x86_64
            cd ../treeship-darwin-aarch64  && sha256sum treeship-darwin-aarch64
            cd ../treeship-darwin-x86_64   && sha256sum treeship-darwin-x86_64
          ) | sort > SHA256SUMS
          cat SHA256SUMS
          echo "sha256_linux_x86_64=$(   awk '/treeship-linux-x86_64/    {print $1}' SHA256SUMS)" >> "$GITHUB_OUTPUT"
          echo "sha256_darwin_aarch64=$( awk '/treeship-darwin-aarch64/  {print $1}' SHA256SUMS)" >> "$GITHUB_OUTPUT"
          echo "sha256_darwin_x86_64=$(  awk '/treeship-darwin-x86_64/   {print $1}' SHA256SUMS)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            treeship-linux-x86_64/treeship-linux-x86_64
            treeship-darwin-aarch64/treeship-darwin-aarch64
            treeship-darwin-x86_64/treeship-darwin-x86_64
            SHA256SUMS
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      # Pre-flight: every package we intend to publish must already exist on
      # the @treeship scope with the OIDC trusted publisher configured. npm
      # returns 404 (not 403) when a new scoped package name is requested by
      # a publisher that lacks scope-create permission, which silently
      # cascades through any downstream package's `npm install`. Fail loud
      # here so a mis-configured scope never produces a partial release.
      #
      # To bootstrap a new package into the scope, do ONE manual publish
      # locally with `npm publish --access public --auth-type=web` from an
      # npm account that owns the @treeship scope. Once the package name
      # exists on the registry at any version, this check passes and future
      # automated publishes work.
      - name: Pre-flight check @treeship scope packages exist on npm
        run: |
          set -e
          MISSING=()
          for pkg in \
            @treeship/core-wasm \
            @treeship/verify \
            @treeship/sdk \
            @treeship/mcp \
            @treeship/a2a \
            @treeship/cli-linux-x64 \
            @treeship/cli-darwin-arm64 \
            @treeship/cli-darwin-x64 \
            treeship; do
            if npm view "$pkg" version > /dev/null 2>&1; then
              echo "  ✓ $pkg exists"
            else
              echo "::error::$pkg does not exist on npm."
              MISSING+=("$pkg")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::${#MISSING[@]} package(s) missing: ${MISSING[*]}"
            echo "::error::Bootstrap each with: npm publish --access public --auth-type=web"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (binaryen)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build and publish @treeship/core-wasm
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          bash packages/core-wasm/build-npm.sh "$VERSION"
          cd packages/core-wasm/pkg
          bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/core-wasm "$VERSION"

      - name: Verify @treeship/core-wasm version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/core-wasm "${GITHUB_REF_NAME#v}"

      - name: Build and publish @treeship/sdk
        working-directory: packages/sdk-ts
        run: |
          set -e
          npm install
          npm run build
          bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/sdk "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/sdk version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/sdk "${GITHUB_REF_NAME#v}"

      - name: Build and publish @treeship/mcp
        working-directory: bridges/mcp
        run: |
          set -e
          npm install
          npm run build
          bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/mcp "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/mcp version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/mcp "${GITHUB_REF_NAME#v}"

      - name: Build and publish @treeship/a2a
        working-directory: bridges/a2a
        run: |
          set -e
          npm install
          npm run build
          bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/a2a "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/a2a version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/a2a "${GITHUB_REF_NAME#v}"

      - name: Build and publish @treeship/verify
        working-directory: packages/verify-js
        run: |
          set -e
          if [ ! -f package.json ]; then
            echo "::error::packages/verify-js missing; cannot publish @treeship/verify"
            exit 1
          fi
          npm install
          npm run build
          bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/verify "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/verify version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/verify "${GITHUB_REF_NAME#v}"

      # Embed the SHA-256 of each per-platform binary into the npm
      # package being published, so the postinstall script can verify
      # the binary it downloads from GitHub against the hash that
      # arrived via npm.
      #
      # Without this step the postinstall would refuse to install
      # ("expected-checksum.txt missing or malformed"). That refusal
      # is the desired behavior — better to fail noisily here than to
      # silently ship an unverifiable binary.
      - name: Embed expected SHA-256 into platform npm packages
        run: |
          set -e
          for slug in linux-x86_64 darwin-aarch64 darwin-x86_64; do
            case "$slug" in
              linux-x86_64)   pkg=cli-linux-x64    sha='${{ needs.release.outputs.sha256_linux_x86_64 }}';;
              darwin-aarch64) pkg=cli-darwin-arm64 sha='${{ needs.release.outputs.sha256_darwin_aarch64 }}';;
              darwin-x86_64)  pkg=cli-darwin-x64   sha='${{ needs.release.outputs.sha256_darwin_x86_64 }}';;
            esac
            if [ -z "$sha" ] || ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "::error::Missing or malformed SHA-256 for $pkg ($slug). Refusing to publish."
              exit 1
            fi
            printf '%s\n' "$sha" > "npm/@treeship/$pkg/expected-checksum.txt"
            echo "  $pkg → $sha"
          done

      - name: Publish @treeship/cli-linux-x64
        working-directory: npm/@treeship/cli-linux-x64
        run: bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/cli-linux-x64 "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/cli-linux-x64 version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/cli-linux-x64 "${GITHUB_REF_NAME#v}"

      - name: Publish @treeship/cli-darwin-arm64
        working-directory: npm/@treeship/cli-darwin-arm64
        run: bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/cli-darwin-arm64 "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/cli-darwin-arm64 version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/cli-darwin-arm64 "${GITHUB_REF_NAME#v}"

      - name: Publish @treeship/cli-darwin-x64
        working-directory: npm/@treeship/cli-darwin-x64
        run: bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" @treeship/cli-darwin-x64 "${GITHUB_REF_NAME#v}"

      - name: Verify @treeship/cli-darwin-x64 version landed
        run: .github/scripts/wait-for-npm-version.sh @treeship/cli-darwin-x64 "${GITHUB_REF_NAME#v}"

      - name: Publish treeship (main wrapper)
        working-directory: npm/treeship
        run: bash "$GITHUB_WORKSPACE/.github/scripts/npm-publish-if-needed.sh" treeship "${GITHUB_REF_NAME#v}"

      - name: Verify treeship wrapper version landed
        run: .github/scripts/wait-for-npm-version.sh treeship "${GITHUB_REF_NAME#v}"

  publish-crates:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish treeship-core
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          CRATE="treeship-core"

          # First line of defense: cargo search. It queries crates.io's
          # registry API over the same path cargo publish uses, so if
          # search reports the exact version, cargo publish would also
          # report it. No CDN layer, no staleness vs. /api/v1/crates.
          if cargo search "$CRATE" --limit 1 | grep -Fq "$CRATE = \"$VERSION\""; then
            echo "  ✓ $CRATE $VERSION already live on crates.io; skipping publish"
            exit 0
          fi

          # Second line of defense: if the search missed (eg. very-fresh
          # publish that has not propagated into search yet) and the
          # registry rejects our publish with "already exists", treat
          # that as success rather than a workflow failure. Any other
          # publish error is still fatal.
          if PUBLISH_OUTPUT="$(cargo publish -p "$CRATE" 2>&1)"; then
            echo "$PUBLISH_OUTPUT"
            exit 0
          fi
          echo "$PUBLISH_OUTPUT"
          if echo "$PUBLISH_OUTPUT" | grep -qE "already (exists|uploaded)"; then
            echo "  ✓ $CRATE $VERSION publish race: registry reports already exists; treating as success"
            exit 0
          fi
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Verify treeship-core on crates.io
        run: .github/scripts/wait-for-crates-version.sh treeship-core "${GITHUB_REF_NAME#v}"

      # treeship-cli is NOT published to crates.io.
      # It's a binary tool with ZK deps that can't satisfy crates.io requirements.
      # Install via: npm install -g treeship (prebuilt binary)
      # Or from source: cargo install --git https://github.com/zerkerlabs/treeship treeship-cli

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build and publish treeship-sdk
        working-directory: packages/sdk-python
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="treeship-sdk"
          # PEP 503 normalizes hyphens to underscores in built filenames; both
          # treeship_sdk-X.Y.Z-*.whl and treeship_sdk-X.Y.Z.tar.gz must exist.
          DIST_NAME="treeship_sdk"

          # First line of defense: version-specific endpoint. Returns
          # 200 for a live version, 404 otherwise; no lag because it
          # reads the exact release record, not a project-wide summary.
          HTTP_CODE="$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/${PKG}/${VERSION}/json")"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ $PKG $VERSION already live on PyPI; skipping publish"
            exit 0
          fi

          # Clean any stale build artifacts before building. v0.9.6 shipped
          # with sdk-python pyproject at 0.9.5; if a left-over dist/ from a
          # previous run exists, twine could upload that wrong-version file
          # under --skip-existing without anyone noticing.
          rm -rf dist build *.egg-info treeship_sdk.egg-info

          python -m build

          # Verify the built artifacts actually carry the expected version.
          # If pyproject.toml drifted from the tag (the v0.9.6 failure mode),
          # python -m build happily produces files named after the wrong
          # version; we refuse to upload them.
          EXPECTED_WHEEL="dist/${DIST_NAME}-${VERSION}-py3-none-any.whl"
          EXPECTED_SDIST="dist/${DIST_NAME}-${VERSION}.tar.gz"
          MISSING=()
          for f in "$EXPECTED_WHEEL" "$EXPECTED_SDIST"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::expected dist artifacts missing: ${MISSING[*]}"
            echo "::error::dist/ contains:"
            ls -la dist/ || true
            echo "::error::pyproject.toml may have drifted from the tag. Aborting before upload."
            exit 1
          fi
          # Refuse to upload anything that isn't the exact two files we expect
          # — if dist/ contains a stray older wheel, --skip-existing would
          # silently accept it.
          UNEXPECTED="$(find dist -mindepth 1 -maxdepth 1 ! -name "$(basename "$EXPECTED_WHEEL")" ! -name "$(basename "$EXPECTED_SDIST")" -print)"
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::unexpected artifacts in dist/, refusing to upload:"
            echo "$UNEXPECTED"
            exit 1
          fi

          # Validate package metadata (long-description rendering, required
          # fields, METADATA-Version compatibility) before upload. PyPI runs
          # the same check server-side; catching it here means we fail
          # before publish instead of after a partial release.
          twine check "$EXPECTED_WHEEL" "$EXPECTED_SDIST"

          # Upload exact paths, not a glob. Belt-and-braces with the dist/
          # cleanup above: even if something snuck in, twine only sees these.
          if UPLOAD_OUTPUT="$(twine upload --skip-existing "$EXPECTED_WHEEL" "$EXPECTED_SDIST" 2>&1)"; then
            echo "$UPLOAD_OUTPUT"
            exit 0
          fi
          echo "$UPLOAD_OUTPUT"
          if echo "$UPLOAD_OUTPUT" | grep -qiE "already (exists|uploaded)|HTTPError: 400"; then
            echo "  ✓ $PKG $VERSION publish race: registry reports already exists; treating as success"
            exit 0
          fi
          exit 1
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Verify treeship-sdk on PyPI
        run: .github/scripts/wait-for-pypi-version.sh treeship-sdk "${GITHUB_REF_NAME#v}"
