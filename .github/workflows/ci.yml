name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p treeship-core

      - name: Build CLI
        run: cargo build -p treeship-cli

      - name: Build CLI with OTel
        run: cargo build -p treeship-cli --features otel

  hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Hub
        working-directory: packages/hub
        run: go build ./...
