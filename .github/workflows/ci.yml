name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # PR-level guard against the failure mode that produced the v0.9.6 PyPI
  # drift: pyproject.toml at 0.9.5 while every other package was at 0.9.6,
  # and stale @treeship/core-wasm pins in three packages. Anchors on
  # packages/core/Cargo.toml and fails if any other site disagrees.
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Check internal version consistency
        run: python3 scripts/check-release-versions.py --consistency

  # Static check that every page advertised in a docs `meta.json`
  # resolves to a real `.mdx` file (or a sub-section), every section
  # root has either an index.mdx or a redirect in `next.config.mjs`,
  # and every redirect points at a destination that exists. Catches
  # the failure mode where a renamed/deleted doc leaves a sidebar
  # entry pointing at a 404, or where a new section ships without a
  # root redirect so `/cli` works but `/concepts` doesn't. Cheap; no
  # network, no build.
  docs-route-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Check docs route health
        run: python3 scripts/check-docs-routes.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (moving branch; pinned to current tip)

      # Run the full shipped-binary test surface, not just core. Before this,
      # CI ran only `cargo test -p treeship-core`, so every regression test in
      # treeship-cli (capability / verify / hub / wrap / resolve / profile) and
      # treeship-core-wasm (the browser verifier) passed on a contributor's
      # machine but never gated a merge. That is the gap the 2026-07 audits
      # flagged: a fix's fail-before-fix test must actually run on push.
      # (treeship-zk-risc0 needs the RISC0 guest toolchain and is added
      # separately; the `zk` feature is pre-release.)
      - name: Run tests
        run: cargo test -p treeship-core -p treeship-cli -p treeship-core-wasm

      - name: Build CLI
        run: cargo build -p treeship-cli

      - name: Build CLI with OTel
        run: cargo build -p treeship-cli --features otel

      # Smoke acceptance: end-to-end session round-trip exercises the full
      # capture-normalize-verify chain. Catches release-breaking regressions
      # the per-package unit tests can't see. T1-T9 stubs in the suite
      # document the broader v0.9.6 trust-fabric invariants pending port.
      - name: Trust-fabric acceptance suite
        run: bash tests/acceptance/trust-fabric.sh

      # Plugin hook parity: runs each plugin's PostToolUse/PreToolUse hooks
      # against fixtures with a mock treeship and diffs the recorded events.
      # Gates the AUD-26 secret-redaction fixtures (and the per-plugin event
      # mapping) so a change to a hook script that leaks or drops events fails
      # on push. Self-contained: mock binary, no cargo build needed.
      - name: Plugin hook parity suite
        run: sh integrations/tests/parity.sh

  hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      - name: Build Hub
        working-directory: packages/hub
        run: go build ./...

      # Run the hub's Go tests too. The object-authz regression tests from the
      # 2026-07 audit (DockOwnsCheckpointSigner, per-dock ownership) live here
      # and previously did not gate merges — CI only built the hub.
      - name: Test Hub
        working-directory: packages/hub
        run: go test ./...

  cross-sdk:
    name: Cross-SDK contract (${{ matrix.os }} / Node ${{ matrix.node }} / Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22']
        python: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (moving branch; pinned to current tip)
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Build CLI
        run: cargo build --bin treeship

      # Cross-SDK builds @treeship/core-wasm from source (so it tests the
      # workspace, not whatever was last published to npm). wasm-pack is
      # required.
      - name: Install wasm-pack
        # Pinned crates.io install with a locked dependency graph,
        # replacing the previous `curl … | sh` which executed whatever
        # the rustwasm.github.io CDN served at job runtime.
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Install tsx
        run: |
          npm install --no-save tsx
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run cross-SDK contract suite
        run: ./tests/cross-sdk/run.sh
