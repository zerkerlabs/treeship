  notes: "Scaffolded at packages/zk-circom/src/native.rs. ark-bn254/ark-groth16/ark-circom version alignment unresolved; native feature is commented out in Cargo.toml."

- id: zk-risc0-bonsai
  name: ZK -- RISC Zero Bonsai (hosted proving)
  section: zk
  status: roadmap
  notes: "Marked `coming in v0.6.0` per packages/zk-risc0/src/prover.rs. BONSAI_API_KEY is detected but falls back to local prover."

