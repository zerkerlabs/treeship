    - treeship
  tests:
    - npm/@treeship/cli-darwin-arm64/postinstall.js
  notes: "Two-trust-root model: expected SHA-256 ships in npm package, binary on GitHub Releases. Fails closed on mismatch. Shipped in v0.10.1."

