# Treeship feature inventory.
#
# SOURCE OF TRUTH for what Treeship actually ships today. Hand-maintained.
# The docs feature-matrix page is GENERATED from this file at build time by
# docs/scripts/sync-feature-matrix.mjs -- edit here, never in the MDX.
# A linter at scripts/check-feature-inventory.py validates each entry
# against the codebase (CLI commands, doc paths, test paths exist).
#
# Status taxonomy:
#   stable        shipped, documented, tested, no known gaps
#   beta          shipped + used, has rough edges or thin docs
#   experimental  shipped behind a flag or with explicit caveats; may change
#   quarantined   shipped code found unsound; fails closed, kept only as a marker
#   roadmap       designed or specced, not implemented
#   internal      exists in code, supports a user-facing feature
#   deprecated    supported but discouraged; replacement exists
#
# Schema (per entry):
#   id        kebab-case, unique
#   name      human-readable name as used in CHANGELOG/docs
#   section   matrix grouping (core | identity | provenance | capture | supply-chain | integrations | zk)
#   status    one of the taxonomy values above
#   cli       list of `treeship ...` invocations that exercise this (optional)
#   packages  list of npm / crate / PyPI package names this ships under (optional)
#   docs      list of primary docs page paths (optional)
#   tests     list of primary test file paths -- one or two, not exhaustive (optional)
#   notes     one-liner context (optional)

- id: receipts
  name: Receipts (signed artifacts)
  section: core
  status: stable
  cli:
    - treeship attest action
    - treeship wrap
    - treeship log
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/artifacts.mdx
  tests:
    - packages/core/src/artifacts/verify.rs
  notes: "DSSE envelopes (Ed25519 over PAE bytes, deterministic declaration-order JSON), content-addressed art_ IDs."

- id: session-reports
  name: Session reports
  section: core
  status: stable
  cli:
    - treeship session start
    - treeship session close
    - treeship session report
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/session-receipts.mdx
    - docs/content/docs/cli/session.mdx
  tests:
    - packages/core/src/session/mod.rs
  notes: "Session start/close/report flow; report uploads to hub and returns a shareable URL."

- id: packages
  name: Session packages (.treeship bundles)
  section: core
  status: stable
  cli:
    - treeship package inspect
    - treeship package verify
    - treeship bundle export
    - treeship bundle import
  packages:
    - treeship-core
  docs:
    - docs/content/docs/cli/package.mdx
    - docs/content/docs/cli/bundle.mdx
  tests:
    - packages/core/src/bundle/mod.rs
    - packages/core/src/session/package.rs
  notes: "Portable signed bundles; package verify authenticates artifacts + Merkle root and warns that narrative fields are unsigned."

- id: offline-verifier
  name: Offline verifier (Rust CLI)
  section: core
  status: stable
  cli:
    - treeship verify
    - treeship package verify
    - treeship merkle verify
  packages:
    - treeship-core
  docs:
    - docs/content/docs/cli/verify.mdx
    - docs/content/docs/concepts/verification-surfaces.mdx
  tests:
    - packages/core/src/verify.rs
  notes: "Walks the parent chain, checks every signature, verifies Merkle inclusion -- all offline. Fetched receipts earn structural-pass, never pass."

- id: wasm-verifier
  name: WASM verifier (@treeship/verify)
  section: core
  status: stable
  packages:
    - "@treeship/verify"
    - "@treeship/core-wasm"
  docs:
    - docs/content/docs/sdk/verify.mdx
    - docs/content/docs/guides/edge-runtime.mdx
  tests:
    - packages/verify-js/test/verify.test.ts
  notes: "Zero-dep WASM (~190KB gzipped); runs on Node, Deno, browsers, Vercel Edge, Cloudflare Workers, AWS Lambda. Certificate checks fail closed without pinned trustRoots."

- id: merkle-checkpoints
  name: Merkle checkpoints
  section: core
  status: stable
  cli:
    - treeship checkpoint
    - treeship merkle proof
    - treeship merkle status
    - treeship merkle publish
  packages:
    - treeship-core
  docs:
    - docs/content/docs/guides/merkle-proofs.mdx
    - docs/content/docs/cli/merkle.mdx
  tests:
    - packages/core/src/merkle/checkpoint.rs
    - packages/core/src/merkle/proof.rs
  notes: "RFC 9162 domain separation (v2). Canonical v3 signing as of v0.10.4 binds merkle_version + zk_proof_digest."

- id: merkle-consistency
  name: Merkle consistency proofs (append-only evidence)
  section: core
  status: stable
  cli:
    - treeship merkle publish
  packages:
    - treeship-core
  docs:
    - docs/content/docs/api/merkle-consistency.mdx
  tests:
    - packages/core/src/merkle/tree.rs
  notes: "Client-computed proofs (verify_consistency) that the tree at to_size extends the tree at from_size; the audit chain walks them offline. Shipped v0.15."

- id: hub-checkpoint-consumer-verifier
  name: Hub-checkpoint consumer verifier
  section: core
  status: stable
  packages:
    - treeship-core
  docs:
    - docs/content/docs/api/merkle-checkpoint.mdx
  tests:
    - packages/core/tests/hub_checkpoint_verify.rs
  notes: "Verifies hub-org JournalCheckpoints against pinned trust roots; rejects untrusted issuers by default since v0.10.3."

- id: hub-transport
  name: Hub transport (attach, push, pull, DPoP)
  section: core
  status: stable
  cli:
    - treeship hub attach
    - treeship hub push
    - treeship hub pull
    - treeship hub status
  docs:
    - docs/content/docs/api/overview.mdx
    - docs/content/docs/cli/hub.mdx
  tests:
    - packages/hub/internal/dpop/dpop_test.go
  notes: "Device-flow login (/v1/dock/*), DPoP-authenticated writes, public content-addressed reads. The Hub stores and serves; it never grades trust."

- id: trust-roots
  name: Trust roots (split kinds)
  section: core
  status: stable
  cli:
    - treeship trust list
    - treeship trust add
    - treeship trust remove
    - treeship keys export
  packages:
    - treeship-core
  docs:
    - docs/content/docs/cli/trust.mdx
    - docs/content/docs/concepts/trust-model.mdx
  tests:
    - packages/core/src/trust/mod.rs
  notes: "Pinned issuer keys, one power per pin since the v0.19 split: agent_cert / cert_issuer / hub_checkpoint / hub_org / revoker / session_host. The old `ship` kind is inert."

- id: approval-use-journal
  name: Approval Use Journal
  section: identity
  status: stable
  cli:
    - treeship approval uses
    - treeship approval status
    - treeship approval journal verify
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/approval-use-journal.mdx
    - docs/content/docs/concepts/approval-authority.mdx
  tests:
    - packages/core/src/statements/approval_use.rs
  notes: "Workspace-local store of consumed approval grants. Enforces max_uses + idempotency-key replay safety. Approvals are scoped by default (--allowed-* / --max-uses, or explicit --unscoped)."

- id: per-agent-keys
  name: Per-agent keys & onboarding
  section: identity
  status: stable
  cli:
    - treeship onboard
    - treeship agent register
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/trust-model.mdx
    - docs/content/docs/guides/how-it-works.mdx
  tests:
    - packages/core/src/keys/mod.rs
  notes: "Registered agents sign with their own Ed25519 key, bound by a ship-issued agent_cert.v1 -- the `proven (key-bound)` actor grade. MCP/A2A bridges auto-provision on startup. Shipped v0.13."

- id: agent-identity-certificates
  name: Agent Identity Certificates
  section: identity
  status: beta
  cli:
    - treeship agent register
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/agent-identity.mdx
  tests:
    - packages/core/src/agent.rs
  notes: "Produces a .agent package (identity.json + capabilities.json + declaration.json + certificate.html). Cross-verify wired into `treeship verify --certificate`. Verification requires a pinned agent_cert root (fail-closed since v0.10.3)."

- id: agent-cards
  name: Agent Cards
  section: identity
  status: stable
  cli:
