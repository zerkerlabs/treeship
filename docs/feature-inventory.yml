  section: identity
  status: beta
  cli:
    - treeship session invite
    - treeship session join
    - treeship session countersign
  packages:
    - treeship-core
  docs:
    - docs/content/docs/concepts/multi-agent-sessions.mdx
  tests:
    - packages/core/src/statements/invitation.rs
  notes: "Host-minted invitations gated by the session_host trust kind; joiner signs, host countersigns. Replay rejected; countersigning hardened in v0.19."

- id: agent-resolver
  name: Agent resolver (local + network)
  section: provenance
  status: stable
  cli:
    - treeship resolve
    - treeship publish
  docs:
    - docs/content/docs/cli/resolve.mdx
    - docs/content/docs/concepts/agent-resolution.mdx
  tests:
    - packages/cli/src/commands/resolve.rs
  notes: "Every verdict re-derived from signed artifacts on the verifier's machine; the Hub proposes, the client decides. Chain walk to a pinned cert_issuer root. Shipped v0.13 (local) / v0.14 (network)."

- id: transparency-audit
  name: Transparency log & audit
  section: provenance
  status: stable
  cli:
    - treeship audit
  docs:
    - docs/content/docs/cli/audit.mdx
    - docs/content/docs/api/agents.mdx
  tests:
    - packages/cli/src/commands/audit.rs
  notes: "Re-proves inclusion offline, checks completeness against the card's committed anchor, witnesses checkpoints (fork/regression detection), verifies the append-only consistency chain."

- id: work-history
  name: Work history (session.v1 records)
  section: provenance
  status: beta
  cli:
    - treeship history
  packages:
    - treeship-core
  docs:
    - docs/content/docs/cli/history.mdx
  tests:
    - packages/cli/src/commands/history.rs
  notes: "Actor-signed session.v1 records binding receipt_digest; attestation class (self/runtime/countersigned) capped to evidence. History proves what was recorded, never everything that happened. Shipped v0.16-v0.18."

- id: agent-profiles
  name: Recomputable agent profiles
  section: provenance
  status: beta
  cli:
    - treeship profile
    - treeship verify-profile
  docs:
    - docs/content/docs/cli/profile.mdx
  tests:
    - packages/cli/src/commands/profile.rs
  notes: "Checkpoint-pinned aggregation over the work history; every number recomputes or the claim is provably false (checked / MISMATCH). Shipped v0.18."

- id: agent-matching
  name: Evidence-based agent matching
  section: provenance
  status: beta
  cli:
    - treeship match
  docs:
    - docs/content/docs/cli/match.mdx
  tests:
    - packages/cli/src/commands/match.rs
  notes: "Find agents by exercised tool globs; the hub proposes candidates, the client re-verifies every record before ranking. Shipped v0.18."

- id: presentations
  name: Presentations & challenge handshake
  section: provenance
  status: beta
  cli:
    - treeship present
    - treeship verify-presentation
  docs:
    - docs/content/docs/cli/present.mdx
    - docs/content/docs/concepts/agent-handshake.mdx
  tests:
    - packages/cli/src/commands/present.rs
  notes: "Registry-free proof handoff: card + cert chain + revocations + Merkle staple, verified fully offline; --challenge proves live key control with the agent's own key (no ship-key fallback). Shipped v0.17."

- id: selective-disclosure
  name: Selective capability disclosure
  section: provenance
  status: beta
  cli:
    - treeship present
  packages:
    - treeship-core
  docs:
    - docs/content/docs/cli/present.mdx
  tests:
    - packages/core/src/capability/mod.rs
  notes: "present --disclose reveals only the capabilities a verifier needs (disclose_capabilities / reconstruct_capabilities); the withheld set cannot be forged or extended, and the card signature still verifies. SD-JWT-style over DSSE. Shipped v0.20."

- id: receipt-export
