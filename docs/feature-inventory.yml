    - treeship verify-capability
    - treeship revoke-capability
  packages:
    - "@treeship/verify"
  docs:
    - docs/content/docs/concepts/capability-cards.mdx
  tests:
    - packages/core/src/capability/mod.rs
  notes: "Signed agent_card.v1 capability sets with captured / exercised / discovered / declared provenance grades; verify-capability cross-checks actions against scope. WASM parity via verifyCapability. Hardened v0.19."

- id: harness-manager
  name: Harness Manager
  section: identity
  status: stable
  cli:
