# Pin the local toolchain so contributors compile and lint against the same
# rustc CI uses. Without this file, contributors silently drift onto whatever
# `stable` is on their machine, and lints / suggestions / MIR-level diagnostics
# diverge from what GitHub Actions sees on a PR.
#
# Channel rationale:
#   CI uses `dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8`,
#   the action's `stable` branch as of v0.10.3 (audit lane C, #80). That branch
#   tracks whatever the latest stable is at the moment GitHub re-resolves the
#   action SHA. As of 2026-05-17 that is 1.94.1 (release date 2026-03-25;
#   confirmed via `curl -s https://static.rust-lang.org/dist/channel-rust-stable.toml`).
#
#   Pinning a specific version locally rather than `stable` keeps local builds
#   deterministic. When CI's stable advances, bump this file in the same PR
#   that bumps the dtolnay/rust-toolchain SHA so the two move in lockstep.
#
# Components: rustup automatically installs `clippy` and `rustfmt` for the
# pinned channel on first cargo invocation, so local devs do not need to run
# `rustup component add` manually.
#
# Targets: the release workflow cross-compiles for x86_64-apple-darwin
# (from macOS arm64 runners), aarch64-apple-darwin (native), and
# x86_64-unknown-linux-musl (from ubuntu glibc runners). Without these
# listed, the `profile = "minimal"` toolchain ships only the runner's
# native stdlib and cross-compile builds fail with `can't find crate for
# 'core'`. The initial v0.10.4 release push (commit cf13139, tag pushed
# 2026-05-18) failed for exactly this reason; this line restores parity
# with what the dtolnay/rust-toolchain action sets up in CI.
[toolchain]
channel    = "1.94.1"
components = ["clippy", "rustfmt"]
profile    = "minimal"
targets    = ["x86_64-apple-darwin", "aarch64-apple-darwin", "x86_64-unknown-linux-musl"]
