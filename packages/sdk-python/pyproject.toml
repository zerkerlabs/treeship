[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "treeship-sdk"
version = "0.3.0"
description = "Python SDK for Treeship - portable trust receipts for agent workflows"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [{name = "Zerker Labs", email = "hello@treeship.dev"}]
keywords = ["treeship", "attestation", "trust", "agents", "verification"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Security :: Cryptography",
]

[project.urls]
Homepage = "https://treeship.dev"
Repository = "https://github.com/zerkerlabs/treeship"
Documentation = "https://docs.treeship.dev"
