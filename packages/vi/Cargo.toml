[package]
name = "treeship-vi"
version = "0.6.0"
edition = "2021"
description = "Verifiable Intent credential support for Treeship"
license = "Apache-2.0"
publish = false

[dependencies]
treeship-core = { path = "../core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
p256 = { version = "0.13", features = ["ecdsa", "jwk"] }
sha2 = "0.10"
base64 = "0.22"
hex = "0.4"
rand = "0.8"
