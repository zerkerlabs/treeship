[package]
name = "treeship-core-wasm"
version = "0.9.5"
edition = "2021"
description = "Treeship verification in the browser via WebAssembly"
license = "Apache-2.0"
repository = "https://github.com/zerkerlabs/treeship"
homepage = "https://treeship.dev"
keywords = ["treeship", "wasm", "verification", "webassembly", "ed25519"]
categories = ["wasm", "cryptography"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
treeship-core = { path = "../core" }
wasm-bindgen  = "0.2"
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
serde-wasm-bindgen = "0.6"
js-sys        = "0.3"
ed25519-dalek = { version = "2", features = ["rand_core"] }
base64        = "0.22"
getrandom     = { version = "0.2", features = ["js"] }

# ZK Groth16 verification (feature-gated)
ark-groth16   = { version = "0.4", optional = true }
ark-bn254     = { version = "0.4", optional = true }
ark-serialize = { version = "0.4", optional = true }
ark-ec        = { version = "0.4", optional = true }
ark-ff        = { version = "0.4", optional = true }

[features]
default = []
zk = ["ark-groth16", "ark-bn254", "ark-serialize", "ark-ec", "ark-ff"]

# WASM release tuning lives at the workspace root under
# [profile.release.package.treeship-core-wasm]. Leaf-level [profile.release]
# is silently ignored in a workspace, so we avoid putting it here to prevent
# future readers from assuming it takes effect.
