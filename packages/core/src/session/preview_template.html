<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Receipt: __SESSION_ID__</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
       background: #09080d; color: #e0e0e0; max-width: 960px; margin: 0 auto; padding: 2rem; }
h1 { font-size: 1.5rem; color: #fff; margin-bottom: 0.25rem; }
h2 { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em;
     font-weight: 500; margin-bottom: 0.75rem; margin-top: 2rem; }
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }
.mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }
.dim { color: #888; }
.card { background: #141414; border: 1px solid #252525; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
.badge-pass { background: #1a3a1a; color: #4ade80; border: 1px solid #4ade8040; }
.badge-fail { background: #3a1a1a; color: #f87171; border: 1px solid #f8717140; }
.badge-warn { background: #3a2a1a; color: #fbbf24; border: 1px solid #fbbf2440; }
.badge-status { background: #1a2a3a; color: #60a5fa; border: 1px solid #60a5fa40; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; }
.stat { text-align: center; }
.stat .value { font-size: 1.4rem; font-weight: 700; color: #fff; }
.stat .label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.03em; }
.check-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
.check-row:last-child { border-bottom: none; }
.check-name { min-width: 140px; color: #ccc; }
.check-detail { color: #888; flex: 1; }
.event-row { display: flex; gap: 0.75rem; padding: 0.4rem 0; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem; }
.event-row:last-child { border-bottom: none; }
.event-time { width: 70px; color: #888; flex-shrink: 0; }
.event-type { color: #60a5fa; min-width: 100px; flex-shrink: 0; }
.event-agent { color: #a855f7; min-width: 100px; flex-shrink: 0; }
.event-summary { color: #ccc; flex: 1; word-break: break-all; }
.agent-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #1a1a1a; }
.agent-row:last-child { border-bottom: none; }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hero { text-align: center; padding: 2rem 0 1rem; }
.hero .status-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.hero .status-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
.hero .root-hash { font-size: 0.75rem; color: #60a5fa; word-break: break-all; }
.summary-count { font-size: 0.75rem; color: #888; margin-top: 0.5rem; }
#verifying { text-align: center; padding: 3rem; color: #888; }
.se-item { font-size: 0.8rem; padding: 0.25rem 0; color: #ccc; }
.se-item .se-agent { color: #888; margin-left: 0.5rem; }
.footer { margin-top: 3rem; text-align: center; color: #555; font-size: 0.7rem; padding-top: 1rem; border-top: 1px solid #1a1a1a; }
</style>
</head>
<body>

<!-- Receipt data in a non-executable block to prevent XSS breakout.
     If any receipt field contains </script>, the HTML parser will NOT
     terminate this tag because type="application/json" blocks are not
     parsed as executable script. -->
<script id="receipt-data" type="application/json">__RECEIPT_JSON__</script>

<div id="verifying">Verifying receipt...</div>
<div id="app" style="display:none"></div>

<script>
// -- Parse receipt from the safe data block --
const RECEIPT = JSON.parse(document.getElementById('receipt-data').textContent);

// ---------------------------------------------------------------------------
// SHA-256 helpers using Web Crypto API (works offline in all modern browsers)
// ---------------------------------------------------------------------------
async function sha256(data) {
  const buf = (typeof data === 'string')
    ? new TextEncoder().encode(data)
    : data;
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return new Uint8Array(hash);
}

function toHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function fromHex(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) {
    bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  }
  return bytes;
}

function concat(a, b) {
  const c = new Uint8Array(a.length + b.length);
  c.set(a, 0);
  c.set(b, a.length);
  return c;
}

// ---------------------------------------------------------------------------
// Merkle tree: RFC 9162 (sha256-rfc9162) — matches tree.rs compute_root
// ---------------------------------------------------------------------------
async function computeMerkleRoot(artifactIds) {
  if (artifactIds.length === 0) return null;
  let level = [];
  for (const id of artifactIds) {
    level.push(await sha256(id));
  }
  while (level.length > 1) {
    const next = [];
    let i = 0;
    while (i + 1 < level.length) {
      next.push(await sha256(concat(level[i], level[i + 1])));
      i += 2;
    }
    if (i < level.length) {
      next.push(level[i]); // RFC 9162: promote unpaired node
    }
    level = next;
  }
  return toHex(level[0]);
}

// ---------------------------------------------------------------------------
// Inclusion proof verification — matches tree.rs verify_proof
// ---------------------------------------------------------------------------
async function verifyInclusionProof(artifactId, proof, rootHex) {
  // Validate algorithm field — must match the Rust verifier's accepted set.
  const algo = proof.algorithm || 'sha256-duplicate-last';
  if (algo !== 'sha256-duplicate-last' && algo !== 'sha256-rfc9162') {
    return false; // unknown algorithm — reject
  }

  const leafHash = await sha256(artifactId);
  if (toHex(leafHash) !== proof.leaf_hash) return false;

  let current = leafHash;
  for (const step of (proof.path || proof.steps || [])) {
    const siblingHex = step.hash || step.sibling_hash;
    if (!siblingHex) return false;
    const sibling = fromHex(siblingHex);
    const dir = (step.direction || '').toLowerCase();
    if (dir === 'right') {
      current = await sha256(concat(current, sibling));
    } else if (dir === 'left') {
      current = await sha256(concat(sibling, current));
    } else {
      return false; // unknown direction — reject, matching Rust's closed enum
    }
  }
  return toHex(current) === rootHex;
}

// ---------------------------------------------------------------------------
// Run all verification checks
// ---------------------------------------------------------------------------
async function runChecks() {
  const checks = [];

  // 1. Receipt parses (it's already parsed since it's embedded)
  checks.push({ name: 'receipt.json', status: 'pass', detail: 'Parses as valid Session Receipt' });

  // 2. Type field
  if (RECEIPT.type === 'treeship/session-receipt/v1') {
    checks.push({ name: 'type', status: 'pass', detail: 'Correct receipt type' });
  } else {
    checks.push({ name: 'type', status: 'fail', detail: 'Expected treeship/session-receipt/v1, got ' + RECEIPT.type });
  }

  // 3. Merkle root recomputation
  const artifacts = RECEIPT.artifacts || [];
  if (artifacts.length > 0) {
    const ids = artifacts.map(a => a.artifact_id);
    const recomputedRoot = await computeMerkleRoot(ids);
    const storedRoot = (RECEIPT.merkle.root || '').replace('mroot_', '');

    if (recomputedRoot === storedRoot) {
      checks.push({ name: 'merkle_root', status: 'pass', detail: 'Merkle root matches recomputed value' });
    } else {
      checks.push({ name: 'merkle_root', status: 'fail',
        detail: 'Mismatch: stored ' + (RECEIPT.merkle.root || 'none').slice(0, 24) + '... vs recomputed mroot_' + (recomputedRoot || '').slice(0, 16) + '...' });
    }

    // 4. Inclusion proofs
    const proofs = RECEIPT.merkle.inclusion_proofs || [];
    for (const entry of proofs) {
      const valid = await verifyInclusionProof(entry.artifact_id, entry.proof || entry, storedRoot);
      checks.push({
        name: 'inclusion:' + entry.artifact_id.slice(0, 16),
        status: valid ? 'pass' : 'fail',
        detail: valid ? 'Inclusion proof valid' : 'Inclusion proof failed',
      });
    }
  } else {
    checks.push({ name: 'merkle_root', status: 'warn', detail: 'No artifacts to verify' });
  }

  // 5. Leaf count
  if (RECEIPT.merkle.leaf_count === artifacts.length) {
    checks.push({ name: 'leaf_count', status: 'pass', detail: 'Leaf count matches artifact count' });
  } else {
    checks.push({ name: 'leaf_count', status: 'fail',
      detail: 'leaf_count ' + RECEIPT.merkle.leaf_count + ' != artifact count ' + artifacts.length });
  }

  // 6. Timeline ordering
  const tl = RECEIPT.timeline || [];
  let ordered = true;
  for (let i = 1; i < tl.length; i++) {
    const prev = [tl[i-1].timestamp, tl[i-1].sequence_no, tl[i-1].event_id];
    const curr = [tl[i].timestamp, tl[i].sequence_no, tl[i].event_id];
    if (prev[0] > curr[0] || (prev[0] === curr[0] && prev[1] > curr[1]) ||
        (prev[0] === curr[0] && prev[1] === curr[1] && prev[2] > curr[2])) {
      ordered = false; break;
    }
  }
  checks.push({
    name: 'timeline_order',
    status: ordered ? 'pass' : 'fail',
    detail: ordered ? 'Timeline is correctly ordered' : 'Timeline entries are not in deterministic order',
  });

  return checks;
}

// ---------------------------------------------------------------------------
// Render the page
// ---------------------------------------------------------------------------
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderChecks(checks) {
  return checks.map(c => {
    const badge = c.status === 'pass' ? '<span class="badge badge-pass">PASS</span>'
                : c.status === 'fail' ? '<span class="badge badge-fail">FAIL</span>'
                : '<span class="badge badge-warn">WARN</span>';
    return '<div class="check-row">' + badge +
      '<span class="check-name mono">' + esc(c.name) + '</span>' +
      '<span class="check-detail">' + esc(c.detail) + '</span></div>';
  }).join('');
}

function formatDuration(ms) {
  if (!ms) return '--';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function timeOnly(iso) { return (iso || '').slice(11, 19); }

const AGENT_COLORS = ['#a855f7','#f59e0b','#14b8a6','#3b82f6','#ec4899','#06b6d4'];

async function render() {
  const checks = await runChecks();
  const allPass = checks.every(c => c.status !== 'fail');
  const passCount = checks.filter(c => c.status === 'pass').length;
  const failCount = checks.filter(c => c.status === 'fail').length;
  const warnCount = checks.filter(c => c.status === 'warn').length;

  const s = RECEIPT.session || {};
  const p = RECEIPT.participants || {};
  const nodes = (RECEIPT.agent_graph || {}).nodes || [];
  const edges = (RECEIPT.agent_graph || {}).edges || [];
  const tl = RECEIPT.timeline || [];
  const se = RECEIPT.side_effects || {};
  const arts = RECEIPT.artifacts || [];
  const mk = RECEIPT.merkle || {};

  let html = '';

  // Hero: verification status
  html += '<div class="hero">';
  html += '<div class="status-icon">' + (allPass ? '&#x2714;' : '&#x2718;') + '</div>';
  html += '<div class="status-text" style="color:' + (allPass ? '#4ade80' : '#f87171') + '">';
  html += allPass ? 'Verified by Treeship' : 'Verification Failed';
  html += '</div>';
  html += '<div class="root-hash mono">' + esc(mk.root || 'no merkle root') + '</div>';
  html += '<div class="summary-count">' + passCount + ' passed, ' + failCount + ' failed, ' + warnCount + ' warnings</div>';
  html += '</div>';

  // Session header
  html += '<h1>' + esc(s.name || s.id) + '</h1>';
  html += '<div class="dim mono" style="margin-bottom:0.5rem">';
  html += '<span class="badge badge-status">' + esc(s.status) + '</span> ';
  html += esc(s.id) + ' &middot; ' + esc(s.started_at || '') + ' &middot; ' + formatDuration(s.duration_ms);
  html += '</div>';

  // Verification checks
  html += '<h2>Verification Checks</h2>';
  html += '<div class="card">' + renderChecks(checks) + '</div>';

  // Participants
  html += '<h2>Participants</h2>';
  html += '<div class="card"><div class="grid">';
  html += '<div class="stat"><div class="value">' + p.total_agents + '</div><div class="label">Agents</div></div>';
  html += '<div class="stat"><div class="value">' + p.spawned_subagents + '</div><div class="label">Spawned</div></div>';
  html += '<div class="stat"><div class="value">' + p.handoffs + '</div><div class="label">Handoffs</div></div>';
  html += '<div class="stat"><div class="value">' + p.max_depth + '</div><div class="label">Max Depth</div></div>';
  html += '<div class="stat"><div class="value">' + p.hosts + '</div><div class="label">Hosts</div></div>';
  html += '<div class="stat"><div class="value">' + (p.tool_runtimes || 0) + '</div><div class="label">Runtimes</div></div>';
  html += '</div></div>';

  // Agent graph
  if (nodes.length > 0) {
    html += '<h2>Agent Graph</h2><div class="card">';
    nodes.forEach((n, i) => {
      const color = AGENT_COLORS[i % AGENT_COLORS.length];
      html += '<div class="agent-row">';
      html += '<span class="agent-dot" style="background:' + color + '"></span>';
      html += '<span style="font-size:0.9rem;font-weight:500">' + esc(n.agent_name) + '</span>';
      html += '<span class="dim mono" style="font-size:0.75rem">' + esc(n.agent_role || 'agent') +
              ' &middot; depth ' + n.depth + ' &middot; ' + n.tool_calls + ' tools &middot; @' + esc(n.host_id) + '</span>';
      if (n.status) html += '<span class="badge ' + (n.status === 'completed' ? 'badge-pass' : n.status === 'failed' ? 'badge-fail' : 'badge-status') + '">' + esc(n.status) + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Timeline
  if (tl.length > 0) {
    html += '<h2>Timeline (' + tl.length + ' events)</h2><div class="card">';
    tl.forEach(ev => {
      html += '<div class="event-row">';
      html += '<span class="event-time mono">' + timeOnly(ev.timestamp) + '</span>';
      html += '<span class="event-type mono">' + esc(ev.event_type) + '</span>';
      html += '<span class="event-agent mono">' + esc(ev.agent_name) + '</span>';
      html += '<span class="event-summary">' + esc(ev.summary || '') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Side effects
  const seFiles = (se.files_written || []).length + (se.files_read || []).length;
  const seTools = (se.tool_invocations || []).length;
  const seProcs = (se.processes || []).length;
  const sePorts = (se.ports_opened || []).length;
  const seNet = (se.network_connections || []).length;
  if (seFiles + seTools + seProcs + sePorts + seNet > 0) {
    html += '<h2>Side Effects</h2><div class="card"><div class="grid" style="margin-bottom:0.75rem">';
    html += '<div class="stat"><div class="value">' + (se.files_read||[]).length + '</div><div class="label">Files Read</div></div>';
    html += '<div class="stat"><div class="value">' + (se.files_written||[]).length + '</div><div class="label">Files Written</div></div>';
    html += '<div class="stat"><div class="value">' + seTools + '</div><div class="label">Tool Calls</div></div>';
    html += '<div class="stat"><div class="value">' + seProcs + '</div><div class="label">Processes</div></div>';
    html += '<div class="stat"><div class="value">' + sePorts + '</div><div class="label">Ports</div></div>';
    html += '<div class="stat"><div class="value">' + seNet + '</div><div class="label">Network</div></div>';
    html += '</div>';
    (se.files_written || []).forEach(f => {
      html += '<div class="se-item mono">' + esc(f.file_path) + '<span class="se-agent">by ' + esc(f.agent_instance_id) + '</span></div>';
    });
    (se.files_read || []).forEach(f => {
      html += '<div class="se-item mono" style="color:#fbbf24">' + esc(f.file_path) + ' (read)<span class="se-agent">by ' + esc(f.agent_instance_id) + '</span></div>';
    });
    html += '</div>';
  }

  // Artifacts
  if (arts.length > 0) {
    html += '<h2>Artifacts (' + arts.length + ')</h2><div class="card">';
    arts.forEach(a => {
      html += '<div class="mono" style="font-size:0.75rem;padding:0.3rem 0;border-bottom:1px solid #1a1a1a;color:#ccc">';
      html += esc(a.artifact_id) + ' <span class="dim">' + esc(a.payload_type) + '</span>';
      if (a.digest) html += ' <span class="dim">' + esc(a.digest.slice(0, 23)) + '...</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Proof summary
  html += '<h2>Proof</h2><div class="card">';
  html += '<div class="mono" style="font-size:0.8rem;margin-bottom:0.5rem"><span class="dim">merkle root</span> ' + esc(mk.root || 'none') + '</div>';
  html += '<div class="mono" style="font-size:0.8rem;margin-bottom:0.5rem"><span class="dim">leaves</span> ' + mk.leaf_count + ' <span class="dim">proofs</span> ' + (mk.inclusion_proofs || []).length + '</div>';
  html += '<div class="mono" style="font-size:0.8rem"><span class="dim">signatures</span> ' + (RECEIPT.proofs || {}).signature_count + '</div>';
  html += '</div>';

  // Footer
  html += '<div class="footer">';
  html += 'Verified client-side using Web Crypto API. No network calls. No server trust.<br>';
  html += 'Generated by <a href="https://treeship.dev">Treeship</a> Session Receipt v1';
  html += '</div>';

  document.getElementById('verifying').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = html;
}

// Check crypto.subtle availability (may be blocked on file:// in some browsers)
if (typeof crypto === 'undefined' || !crypto.subtle) {
  document.getElementById('verifying').innerHTML =
    '<div style="color:#fbbf24;max-width:500px;margin:2rem auto;text-align:center">' +
    '<div style="font-size:1.5rem;margin-bottom:0.5rem">Verification unavailable</div>' +
    '<div style="font-size:0.85rem;color:#888">This browser does not support Web Crypto API on this origin. ' +
    'Try opening preview.html via a local HTTP server (python3 -m http.server) or use ' +
    '<code style="color:#60a5fa">treeship package verify</code> from the CLI.</div></div>';
} else {
  render().catch(e => {
    document.getElementById('verifying').innerHTML =
      '<div style="color:#f87171">Verification error: ' + e.message + '</div>';
  });
}
</script>
</body>
</html>
