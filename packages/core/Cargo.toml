[package]
name = "treeship-core"
version = "0.10.0"
edition = "2021"
description = "Portable trust receipts for agent workflows - core library"
license = "Apache-2.0"
repository = "https://github.com/zerkerlabs/treeship"
homepage = "https://treeship.dev"
keywords = ["treeship", "attestation", "trust", "agents", "cryptography"]
categories = ["cryptography", "authentication"]

[dependencies]
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2          = "0.10"
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
base64        = "0.22"
rand          = "0.8"
serde_yaml    = "0.9"
hex           = "0.4"

# hostname doesn't compile on WASM (no OS-level hostname APIs). Gate it to
# non-wasm targets; the WASM build falls back to "host_unknown".
# fs2 (advisory file locks via flock / Windows equivalents) is required by
# the event_log append path so sequence_no assignment is race-free across
# multiple `treeship session event` processes (e.g. parallel PostToolUse
# hook invocations from a Claude Code plugin). WASM contexts have neither
# concurrent writers nor a real filesystem, so fs2 is gated to non-wasm too.
[target.'cfg(not(target_family = "wasm"))'.dependencies]
hostname      = "0.4"
fs2           = "0.4"

[dev-dependencies]
# tempfile drives the journal tests (PR 2 of v0.9.9) — every test uses
# an isolated tmpdir for the on-disk store so they can run in parallel.
tempfile = "3"
