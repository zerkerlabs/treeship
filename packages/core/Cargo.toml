[package]
name = "treeship-core"
version = "0.1.0"
edition = "2021"
description = "Portable trust receipts for agent workflows - core library"
license = "Apache-2.0"
repository = "https://github.com/zerkerlabs/treeship"
homepage = "https://treeship.dev"
keywords = ["treeship", "attestation", "trust", "agents", "cryptography"]
categories = ["cryptography", "authentication"]

[dependencies]
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2          = "0.10"
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
base64        = "0.22"
rand          = "0.8"
serde_yaml    = "0.9"
hex           = "0.4"

[dev-dependencies]
# Nothing extra needed — tests use the same crates
