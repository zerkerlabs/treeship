[package]
name = "treeship-zk-circom"
version = "0.5.0"
edition = "2021"
description = "Zero-knowledge proof circuits for Treeship"
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
thiserror = "1"
num-bigint = "0.4"
rand = "0.8"
tempfile = "3"
