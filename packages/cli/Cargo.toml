[package]
name = "treeship-cli"
version = "0.2.1"
edition = "2021"
description = "Portable trust receipts for agent workflows - CLI"
license = "Apache-2.0"
repository = "https://github.com/zerkerlabs/treeship"
homepage = "https://treeship.dev"
keywords = ["treeship", "attestation", "trust", "agents", "cli"]
categories = ["command-line-utilities", "cryptography"]

[[bin]]
name = "treeship"
path = "src/main.rs"

[features]
default = []
otel = []  # No extra deps -- uses ureq + serde_json already available

[dependencies]
treeship-core = { version = "0.2.1", path = "../core" }
clap = { version = "4", features = ["derive"] }
serde         = { version = "1", features = ["derive"] }
serde_json = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand          = "0.8"
home = "0.5"
base64 = "0.22"
hex = "0.4"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
serde_yaml = "0.9"
ratatui    = "0.28"
crossterm  = "0.28"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
