[package]
name = "treeship-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "treeship"
path = "src/main.rs"

[dependencies]
treeship-core = { path = "../core" }
clap = { version = "4", features = ["derive"] }
serde         = { version = "1", features = ["derive"] }
serde_json = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand          = "0.8"
home = "0.5"
base64 = "0.22"
hex = "0.4"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
serde_yaml = "0.9"
